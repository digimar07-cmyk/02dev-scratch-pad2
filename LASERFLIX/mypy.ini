[mypy]
python_version = 3.14
strict = false

# Habilita checagens incrementais
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
check_untyped_defs = true

# Ignora libs de terceiros sem stubs
ignore_missing_imports = true

# Módulos do projeto
mypy_path = .

# Exclui arquivos de UI pesados e scripts de ferramentas
exclude = (?x)(
    ui/main_window\.py
  | ui/components/
  | refactor_monitor\.py
  | backup_manager\.py
)

[mypy-tests.*]
# Testes: menos rigor, foco em core/
disallow_untyped_defs = false
