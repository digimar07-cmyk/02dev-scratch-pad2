[tool.ruff]
# Versão alvo
target-version = "py314"
line-length = 100

[tool.ruff.lint]
# Regras habilitadas:
#   E/W  = pycodestyle (erros e warnings)
#   F    = pyflakes (imports não usados, variáveis não usadas)
#   I    = isort (ordenação de imports)
#   UP   = pyupgrade (modernização de sintaxe)
#   B    = flake8-bugbear (bugs comuns)
#   SIM  = flake8-simplify (simplificações)
select = ["E", "W", "F", "I", "UP", "B", "SIM"]

# Regras ignoradas — decisão consciente:
#   E501  = linha longa (controlado pelo line-length acima)
#   B008  = chamadas de função em argumentos default (comum em Tkinter)
#   SIM108 = ternário forçado (reduz legibilidade em casos complexos)
ignore = ["E501", "B008", "SIM108"]

[tool.ruff.lint.isort]
known-first-party = ["config", "core", "ui", "utils", "ai"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.coverage.run]
source = ["core", "ui/controllers"]
omit = [
    "tests/*",
    "ui/main_window.py",
    "ui/components/*",
    "refactor_monitor.py",
    "backup_manager.py",
]

[tool.coverage.report]
fail_under = 60
show_missing = true
skip_covered = false
