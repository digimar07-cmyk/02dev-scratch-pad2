[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

testpaths = tests

# basetemp fora do AppData para evitar PermissionError com usuario acentuado no Windows
basetemp = QA/tmp_pytest

# --cov NAO entra aqui: rodar manualmente ou no CI com escopo correto
# Exemplo: pytest tests/ --cov=core/database --cov=core/collections_manager --cov=ui/controllers/selection_controller
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    smoke: Testes de fumaca (nao quebra ao inicializar)
    integration: Testes de integracao entre modulos
    slow: Testes lentos (podem ser pulados em CI rapido)
    requires_ollama: Testes que requerem Ollama rodando

# Coverage SCOPED - mede apenas modulos com testes escritos
# Expandir esta lista a cada novo modulo testado
[coverage:run]
source =
    core/database
    core/collections_manager
    ui/controllers/selection_controller
omit =
    tests/*
    */site-packages/*
    */__pycache__/*

[coverage:report]
fail_under = 70
show_missing = true
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.
    if TYPE_CHECKING:
