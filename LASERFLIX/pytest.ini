[pytest]
# Configuração do pytest para Laserflix

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Diretório de testes
testpaths = tests

# Opções padrão
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers customizados
markers =
    smoke: Testes de fumaça (não quebra ao inicializar)
    integration: Testes de integração entre módulos
    slow: Testes lentos (podem ser pulados em CI rápido)
    requires_ollama: Testes que requerem Ollama rodando

# Coverage (quando rodar com --cov)
[coverage:run]
source = .
omit = 
    tests/*
    */site-packages/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
