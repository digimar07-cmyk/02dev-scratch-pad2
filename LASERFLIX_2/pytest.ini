[pytest]
testpaths = tests
addopts = --tb=short -v --ignore=tests/_archived
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers registrados
markers =
    smoke: testes de inicializacao rapida (gate minimo de CI)
    unit: testes unitarios isolados
    integration: testes de integracao com I/O controlado
    structural: testes arquiteturais (guardioes de regras)
    slow: testes lentos (excluir com -m 'not slow')
